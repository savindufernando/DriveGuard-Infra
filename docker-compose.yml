version: "3.8"

services:
  # ─── DZ (Dangerous Zone) API ────────────────────────────────────
  dz-api:
    image: savindufernando/fyp-dz-api:latest
    container_name: driveguard-dz
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "8000:8000"

  # ─── TSR (Traffic Sign Recognition) API ─────────────────────────
  tsr-api:
    image: savindufernando/fyp-tsr-api:latest
    container_name: driveguard-tsr
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "8001:8001"

  # ─── Fusion Layer API ───────────────────────────────────────────
  fusion-api:
    image: savindufernando/fyp-fusion-api:latest
    container_name: driveguard-fusion
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: "1"
      MYSQL_HOST: "kaduwelaautomart.lk"
      MYSQL_USER: "kaduwelaauto_driveguard"
      MYSQL_PASSWORD: "LsA6~qNId-&u5(cv"
      MYSQL_DB: "kaduwelaauto_driveguard_blackspots"
      TSR_URL: "http://tsr-api:8001"
      DZ_URL: "http://dz-api:8000"
    ports:
      - "8002:8002"

  # ─── Nginx Reverse Proxy (Port 80 → Fusion API) ────────────────
  nginx:
    image: nginx:alpine
    container_name: driveguard-nginx
    restart: unless-stopped
    depends_on:
      - fusion-api
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
