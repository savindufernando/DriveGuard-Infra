apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: driveguard
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/savindufernando/DriveGuard-Infra.git'
    path: k8s
    targetRevision: master
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
