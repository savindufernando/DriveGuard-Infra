apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fusion-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: fusion-service
            port:
              number: 8002
